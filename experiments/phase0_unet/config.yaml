# Phase-0 UNet training config — shared by conditions A, C, G.
batch_size: 8
learning_rate: 1.0e-3
num_epochs: 100
optimizer: adam
weight_decay: 1.0e-5
scheduler: cosine
input_resolution: 512
seed: 42
val_split: 0.2
hflip_p: 0.5

# Data paths (relative to project root)
db_root: databases
physics_npz_dir: experiments/skeleton_reconstruction/masks/Train

# Output
output_root: experiments/phase0_unet/results
